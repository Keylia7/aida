<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <base href="./../">
    <title>AIDA | Pilotage des Initiatives</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/initiatives.css">
    <link href="assets/fonts/Orbitron-VariableFont_wght.ttf" rel="stylesheet">
</head>
<body class="page-initiatives">

    <div class="app-container vertical">
        <div class="main-workspace">
            <nav class="side-nav" id="main-nav">
            </nav>

            <main class="kanban-area">
                <header class="view-header">
                    <div class="header-left">
                        <h2>Pipeline des Initiatives</h2>
                    </div>
                    <div class="view-switcher">
                        <button class="view-btn active" data-view="strategy">VUE STRATÉGIE</button>
                        <button class="view-btn" data-view="ops">VUE OPÉRATIONS</button>
                    </div>
                </header>

                <div class="kanban-board" id="kanban-board">
                    </div>
            </main>
        </div>
        <footer class="initiative-console" id="initiative-console">
            <div class="console-header">
                <span id="console-title">SÉLECTIONNEZ UNE INITIATIVE</span>
                <div class="console-controls">
                    <span id="console-id-badge"></span>
                    <button class="close-console" onclick="toggleConsole()">_</button>
                </div>
            </div>
            
            <div class="console-content">
                <div class="console-column info-panel">
                    <h3>LOGS STRATÉGIQUES</h3>
                    <p id="con-desc" class="desc-text"></p>
                    <div id="con-global-process" class="process-list"></div>
                </div>

                <div class="console-column subjects-panel">
                    <h3>SUJETS LIÉS</h3>
                    <div id="con-candidate-list" class="subject-grid"></div>
                </div>

                <div class="console-column analysis-panel">
                    <h3>DIAGNOSTIC INDIVIDUEL</h3>
                    <div id="con-individual-details">
                        <p class="hint">Sélectionnez un sujet pour voir sa progression.</p>
                    </div>
                </div>
            </div>
        </footer>
    </div>

    <footer class="system-bar">
        <div class="status-item">
            <span class="dot pulse"></span> SYSTEM: OPERATIONAL
        </div>
        <div class="status-item">
            ENC: AES-256 SECURED
        </div>
        <div class="status-item" id="live-clock">
            </div>
    </footer>

    <script src="js/config-nav.js"></script>
    <script src="js/initiatives-loader.js"></script>
</body>
</html>
