<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <base href="./../">
    <title>AIDA | Gestion des Sujets</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/svg+xml" href="assets/svg/favicon.svg">
    <link href="assets/fonts/Orbitron-VariableFont_wght.ttf" rel="stylesheet">
</head>
<body class="page-candidates">

    <div class="app-container">
        <nav class="side-nav" id="main-nav">
        </nav>

        <aside class="search-panel">
            <div class="panel-header">
                <h2>Candidats</h2>
                
                <div class="filter-section">
                    <span class="filter-label">Filtrer par statut :</span>
                    <div id="status-filters" class="status-pills"></div>
                </div>
            </div>

            <div id="candidates-list" class="scroll-list">
                </div>
        </aside>

        <section class="details-view" id="candidate-details">

            <div class="empty-state-message" id="empty-message">
                <h2>SÉLECTIONNEZ UN CANDIDAT</h2>
                <p>En attente de données...</p>
            </div>
            
            <div class="readonly-watermark">READ ONLY ACCESS</div>

            <header class="details-header">
                <div class="identity-block">
                    <h2 id="det-fullname">Sélectionnez un sujet</h2>
                    <p id="det-situation"En attente de données...</p>
                </div>
                <div class="stats-block">
                    <div class="stat-item">
                        <span class="label">ÂGE</span>
                        <span class="value" id="det-age">--</span>
                    </div>
                    <div class="stat-item">
                        <span class="label">SEXE</span>
                        <span class="value" id="det-sex">--</span>
                    </div>
                </div>
            </header>

            <div class="details-grid">
                <div class="info-card">
                    <h3>Parcours Professionnel</h3>
                    <div id="det-experience" class="data-list"></div>
                </div>
                
                <div class="info-card">
                    <h3>Éducation & Formations</h3>
                    <div id="det-education" class="data-list"></div>
                </div>

                <div class="info-card">
                    <h3>Analyse Psychologique</h3>
                    <div class="mbti-container">
                        <span class="mbti-badge" id="det-mbti">----</span>
                    </div>
                    <p id="det-notes" class="analysis-text"></p>
                </div>
            </div>
        </section>
    </div>

    <footer class="system-bar">
        <div class="status-item">
            <span class="dot pulse"></span> SYSTEM: OPERATIONAL
        </div>
        <div class="status-item">
            ENC: AES-256 SECURED
        </div>
        <div class="status-item" id="live-clock">
            </div>
    </footer>

    <script src="js/config-nav.js"></script>
    <script src="js/candidates-loader.js"></script>
</body>
</html>
