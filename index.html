<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>AIDA | Letha Command Center</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="./assets/fonts/Orbitron-VariableFont_wght.ttf" rel="stylesheet">
</head>
<body>
    <main class="dashboard">
        <header class="main-header">
            <div class="logo-area">
                <h1>AIDA</h1>
                <span class="version">v2.4.0 - CONSULTATION MODE</span>
            </div>
            
            <div class="header-right">
                <div class="baseline-status">
                    <span class="label">CURRENT BASELINE :</span>
                    <span class="value">#742-ALPHA</span>
                </div>

                <div class="user-session">
                    <div class="user-info">
                        <span class="user-name">J. DELISLE</span> 
                        <span class="user-role">STRATEGIC ANALYST <br/> (LEVEL 4)</span>
                    </div>
                    <div class="user-avatar">
                        <img src="https://api.dicebear.com/9.x/rings/svg?ringColor=4db6ac" alt="Avatar">
                    </div>
                </div>
            </div>
        </header>

        <section class="menu-grid">
        </section>

    </main>

    <footer class="system-bar">
        <div class="status-item">
            <span class="dot pulse"></span> SYSTEM: OPERATIONAL
        </div>
        <div class="status-item">
            ENC: AES-256 SECURED
        </div>
        <div class="status-item" id="live-clock">
            </div>
    </footer>

    <script src="./js/config-nav.js"></script>
    <script src="./js/main.js"></script>
</body>
</html>
